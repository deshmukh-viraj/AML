name: AML Triage CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

env:
  DAGSHUB_TOKEN: ${{ secrets.AML_TEST }}
  DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup        # ← shared setup in one line

      - name: Run Pipeline
        run: |
          dvc remote modify myremote auth basic
          dvc remote modify myremote user virajdeshmukh080818
          dvc remote modify myremote password $DAGSHUB_TOKEN
          dvc pull
          dvc repro
          dvc push


  test-and-deploy:
    needs: run-pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup        # ← same shared setup

      - name: Configure DVC credentials
        run: |
          dvc remote modify myremote auth basic
          dvc remote modify myremote user virajdeshmukh080818
          dvc remote modify myremote password $DAGSHUB_TOKEN
          dvc pull

      - name: Run Model Evaluation
        run: python src/model/model_evaluation.py

      - name: Run Model Registry
        run: python src/model/model_registry.py

      - name: Run Model Tests
        run: python -m pytest tests/test_model.py

      - name: Promote Model to Production
        if: success()
        run: python scripts/promote_model.py

      - name: Run FastAPI App tests
        if: success()
        run: python -m pytest tests/test_app.py


