name: AML Triage CI Pipeline

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # ── TEMPORARILY COMMENTED OUT FOR DOCKER TESTING ──
  # run-pipeline:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     # ... etc

  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and Push Docker image to GHCR
        run: |
          IMAGE_NAME=ghcr.io/${{ github.actor }}/aml-triage:latest
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME